apiVersion: v1
kind: Namespace
metadata:
  name: trace-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: trace-lab
  labels:
    app: zipkin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3.5
          ports:
            - name: http
              containerPort: 9411
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: trace-lab
  labels:
    app: zipkin
spec:
  selector:
    app: zipkin
  ports:
    - name: http
      port: 9411
      targetPort: http
