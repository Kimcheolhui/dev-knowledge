apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-dns-client-app
  namespace: trace-lab
  labels:
    app: otel-dns-client
data:
  app.py: |
    import socket
    import time

    import requests
    from fastapi import FastAPI, Query

    app = FastAPI()


    @app.get("/resolve-and-call")
    def resolve_and_call(host: str = Query("www.microsoft.com")):
        started = time.time()
        answers = socket.getaddrinfo(host, 443, type=socket.SOCK_STREAM)
        addresses = sorted({answer[4][0] for answer in answers})
        response = requests.get(f"https://{host}/", timeout=5)
        elapsed_ms = round((time.time() - started) * 1000, 2)
        return {
            "host": host,
            "addresses": addresses,
            "status_code": response.status_code,
            "elapsed_ms": elapsed_ms,
        }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-dns-client
  namespace: trace-lab
  labels:
    app: otel-dns-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-dns-client
  template:
    metadata:
      labels:
        app: otel-dns-client
    spec:
      containers:
        - name: app
          image: python:3.12-slim
          workingDir: /app
          command:
            - /bin/sh
            - -c
          args:
            - |
              pip install --no-cache-dir fastapi uvicorn requests 'opentelemetry-distro[otlp]' opentelemetry-instrumentation-fastapi opentelemetry-instrumentation-requests &&
              opentelemetry-bootstrap -a install &&
              opentelemetry-instrument uvicorn app:app --host 0.0.0.0 --port 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: otel-dns-client
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.trace-lab.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_LOGS_EXPORTER
              value: none
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: app
              mountPath: /app/app.py
              subPath: app.py
      volumes:
        - name: app
          configMap:
            name: otel-dns-client-app
---
apiVersion: v1
kind: Service
metadata:
  name: otel-dns-client
  namespace: trace-lab
  labels:
    app: otel-dns-client
spec:
  selector:
    app: otel-dns-client
  ports:
    - name: http
      port: 8080
      targetPort: http
